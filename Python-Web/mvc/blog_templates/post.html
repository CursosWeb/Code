<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{post.title} - Blog Simple</title>
    <style>
        body {{
            font-family: Georgia, serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fafafa;
            line-height: 1.6;
        }}
        .post-container {{
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #8B4513;
        }}
        .post-title {{
            font-size: 32px;
            margin: 0 0 20px 0;
            color: #333;
            line-height: 1.3;
        }}
        .post-meta {{
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            font-style: italic;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }}
        .post-content {{
            color: #444;
            font-size: 18px;
            white-space: pre-wrap;
            margin-bottom: 30px;
        }}
        .post-actions {{
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }}
        .btn {{
            display: inline-block;
            padding: 12px 24px;
            margin: 0 10px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }}
        .btn-back {{
            background-color: #6c757d;
            color: white;
            border: 1px solid #6c757d;
        }}
        .btn-back:hover {{
            background-color: #5a6268;
        }}
        .btn-delete {{
            background-color: #dc3545;
            color: white;
            border: 1px solid #dc3545;
        }}
        .btn-delete:hover {{
            background-color: #c82333;
        }}
    </style>
</head>
<body>
    <div class="post-container">
        <h1 class="post-title">{post.title}</h1>
        <div class="post-meta">
            Por {post.author} el {post.date}
        </div>
        <div class="post-content">
{post.content}
        </div>
        <div class="post-actions">
            <a href="/" class="btn btn-back">← Volver al Blog</a>
            <a href="/delete/{post.id}" class="btn btn-delete" onclick="return confirm('¿Estás seguro de que quieres eliminar este post?')">Eliminar Post</a>
        </div>
    </div>
</body>
</html>
